<svg width="400" height="220" viewBox="0 0 400 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&amp;family=Crimson+Text:ital@1');
    </style>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bgGlow" cx="50%" cy="42%" r="40%">
      <stop offset="0%" stop-color="#c8a030" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0a0a14" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="220" fill="#0a0a14"/>
  <rect width="400" height="220" fill="url(#bgGlow)"/>

  <!-- Orbit rings -->
  <circle cx="200" cy="88" r="64" fill="none" stroke="#1e1e34" stroke-width="1"/>
  <circle cx="200" cy="88" r="59" fill="none" stroke="#c8a030" stroke-width="0.6" stroke-dasharray="3 6" opacity="0.45"/>

  <!-- Constellation lines -->
  <line x1="200" y1="40"  x2="166" y2="100" stroke="#c8a030" stroke-width="1.2" opacity="0.65"/>
  <line x1="200" y1="40"  x2="234" y2="100" stroke="#c8a030" stroke-width="1.2" opacity="0.65"/>
  <line x1="166" y1="100" x2="182" y2="80"  stroke="#c8a030" stroke-width="1.2" opacity="0.65"/>
  <line x1="234" y1="100" x2="218" y2="80"  stroke="#c8a030" stroke-width="1.2" opacity="0.65"/>
  <line x1="182" y1="80"  x2="218" y2="80"  stroke="#c8a030" stroke-width="1.2" opacity="0.65"/>
  <line x1="182" y1="80"  x2="200" y2="124" stroke="#c8a030" stroke-width="1.2" opacity="0.65"/>
  <line x1="218" y1="80"  x2="200" y2="124" stroke="#c8a030" stroke-width="1.2" opacity="0.65"/>

  <!-- Star nodes -->
  <circle cx="166" cy="100" r="3.5" fill="#c8a030" filter="url(#glow)"/>
  <circle cx="234" cy="100" r="3.5" fill="#c8a030" filter="url(#glow)"/>
  <circle cx="182" cy="80"  r="2.8" fill="#c8a030" filter="url(#glow)"/>
  <circle cx="218" cy="80"  r="2.8" fill="#c8a030" filter="url(#glow)"/>
  <circle cx="200" cy="124" r="3.5" fill="#c8a030" filter="url(#glow)"/>

  <!-- Crown star apex -->
  <path d="M197 38 L200 30 L203 38 L211 42 L203 46 L200 54 L197 46 L189 42 Z"
        fill="#e8d090" filter="url(#starGlow)"/>

  <!-- Wordmark -->
  <text x="200" y="162"
        font-family="'Cinzel', Georgia, 'Times New Roman', serif"
        font-size="24" font-weight="700"
        fill="#c8a030" text-anchor="middle" letter-spacing="8">MAGNA VIA</text>

  <!-- Decorative rules -->
  <line x1="108" y1="170" x2="156" y2="170" stroke="#c8a030" stroke-width="0.7" opacity="0.4"/>
  <line x1="244" y1="170" x2="292" y2="170" stroke="#c8a030" stroke-width="0.7" opacity="0.4"/>

  <!-- Tagline -->
  <text x="200" y="188"
        font-family="'Crimson Text', Georgia, 'Times New Roman', serif"
        font-size="12" font-style="italic"
        fill="#887870" text-anchor="middle" letter-spacing="3">Temukan Jalanmu</text>
</svg>
