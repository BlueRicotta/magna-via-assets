<svg width="560" height="100" viewBox="0 0 560 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="560" height="100" fill="#e8e0d0"/>

  <!-- Symbol mark -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#c8a030" stroke-width="0.7" stroke-dasharray="2 5" opacity="0.55"/>

  <!-- Constellation lines -->
  <line x1="50" y1="20"  x2="30" y2="64"  stroke="#2a1a00" stroke-width="1" opacity="0.35"/>
  <line x1="50" y1="20"  x2="70" y2="64"  stroke="#2a1a00" stroke-width="1" opacity="0.35"/>
  <line x1="30" y1="64"  x2="38" y2="50"  stroke="#2a1a00" stroke-width="1" opacity="0.35"/>
  <line x1="70" y1="64"  x2="62" y2="50"  stroke="#2a1a00" stroke-width="1" opacity="0.35"/>
  <line x1="38" y1="50"  x2="62" y2="50"  stroke="#2a1a00" stroke-width="1" opacity="0.35"/>
  <line x1="38" y1="50"  x2="50" y2="78"  stroke="#2a1a00" stroke-width="1" opacity="0.35"/>
  <line x1="62" y1="50"  x2="50" y2="78"  stroke="#2a1a00" stroke-width="1" opacity="0.35"/>

  <!-- Nodes -->
  <circle cx="30" cy="64" r="2.5" fill="#c8a030" filter="url(#glow)"/>
  <circle cx="70" cy="64" r="2.5" fill="#c8a030" filter="url(#glow)"/>
  <circle cx="38" cy="50" r="2"   fill="#c8a030" filter="url(#glow)"/>
  <circle cx="62" cy="50" r="2"   fill="#c8a030" filter="url(#glow)"/>
  <circle cx="50" cy="78" r="2.5" fill="#c8a030" filter="url(#glow)"/>

  <!-- Apex star -->
  <path d="M48 18 L50 13 L52 18 L57 20 L52 22 L50 27 L48 22 L43 20 Z" fill="#c8a030"/>

  <!-- Divider line -->
  <line x1="100" y1="20" x2="100" y2="80" stroke="#c8a030" stroke-width="0.7" opacity="0.35"/>

  <!-- Wordmark -->
  <text x="118" y="48"
        font-family="'Cinzel', Georgia, 'Times New Roman', serif"
        font-size="26" font-weight="700"
        fill="#1a1000" letter-spacing="7">MAGNA VIA</text>

  <!-- Rule under wordmark -->
  <line x1="118" y1="57" x2="490" y2="57" stroke="#c8a030" stroke-width="0.6" opacity="0.5"/>

  <!-- Tagline -->
  <text x="118" y="74"
        font-family="'Crimson Text', Georgia, 'Times New Roman', serif"
        font-size="13" font-style="italic"
        fill="#5a4030" letter-spacing="3">Temukan Jalanmu</text>
</svg>
